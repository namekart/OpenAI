kind = "web"
previewPath = "/"
title = "OpenBusiness AI - Product Page"
version = "1.0.0"
id = "artifacts/openbusiness-web"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 23046
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/openbusiness-web run dev"

[services.env]
PORT = "23046"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/openbusiness-web", "run", "build"]
publicDir = "artifacts/openbusiness-web/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
